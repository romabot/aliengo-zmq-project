name: Walking Performance Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libasound2t64 \
            libxtst6 \
            libxrandr2 \
            libxinerama1 \
            libxcursor1 \
            libxi6 \
            xvfb

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install mujoco numpy pyzmq matplotlib

      - name: Verify MuJoCo
        run: python -c "import mujoco; print(mujoco.__version__)"

      - name: Run integration test
        run: python tests/integration_test.py
